name: Deploy .NET WebAPI

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '7.0.x'

      - name: Publish
        run: dotnet publish -c Release --output ./publish

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Stop app (upload app_offline.htm)
        run: |
          echo "Site em manutencao. Voltamos ja!" > app_offline.htm
          lftp -c "open -u ${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }} \
            -e 'put app_offline.htm -o /apshows/app_offline.htm; quit' \
            ${{ secrets.FTP_SERVER }}"
          sleep 5

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@4.3.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./publish/
          server-dir: /apshows/
          dangerous-clean-slate: true
          log-level: standard
          git-ftp-args: --insecure

      - name: Start app (remove app_offline.htm)
        run: |
          lftp -c "open -u ${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }} \
            -e 'rm /apshows/app_offline.htm; quit' \
            ${{ secrets.FTP_SERVER }}"

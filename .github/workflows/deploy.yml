name: Deploy .NET WebAPI

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '7.0.x'

      - name: Publish
        run: dotnet publish -c Release --output ./publish

      - name: Inject connection string
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_DATABASE: ${{ secrets.DB_DATABASE }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          CONN="Server=${DB_HOST};Port=${DB_PORT};Database=${DB_DATABASE};User=${DB_USER};Password=${DB_PASSWORD};CharSet=utf8mb4;Pooling=true;"
          jq --arg conn "$CONN" '.ConnectionStrings.DefaultConnection = $conn' \
            ./publish/appsettings.json > tmp.json && mv tmp.json ./publish/appsettings.json

      - name: Create app_offline to stop the site
        run: |
          echo "<!DOCTYPE html><html><head><title>Em manutenção</title></head><body><h1>API em manutenção</h1></body></html>" > app_offline.htm
          curl -T app_offline.htm "ftp://${{ secrets.FTP_SERVER }}/apshows/app_offline.htm" --user "${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}" --ftp-create-dirs
          
      - name: Wait for shutdown
        run: sleep 5

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@4.3.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./publish/
          server-dir: /apshows/
          log-level: standard

      - name: Remove app_offline to restart the site
        run: |
          curl -Q "DELE /apshows/app_offline.htm" "ftp://${{ secrets.FTP_SERVER }}" --user "${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}"
